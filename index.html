<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>My heart</title>
    <link rel="icon" type="image/x-icon" href="public/heart.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-deep: #fffbea;
        --bg-mid: #fff3bd;
        --bg-soft: #ffe78a;
        --lemon: #f6dd6b;
        --lemon-strong: #eacb48;
        --olive-soft: #d9ba4d;
        --cream: #7a6220;
        --text-soft: rgba(122, 98, 32, 0.78);
        --line-soft: rgba(234, 203, 72, 0.34);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: 'Fira Sans', sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 246, 184, 0.72) 0%, rgba(255, 246, 184, 0) 32%),
          linear-gradient(180deg, #fffef4 0%, #fff5c8 50%, #ffe89a 100%);
        color: var(--cream);
      }
      
      canvas {
        width: 100%;
        height: 100%;
      }
      
      .footer {
        font-family: 'Fira Sans', sans-serif;
        font-weight: 300;
        position: fixed;
        width: 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 3px;
        color: rgba(138, 112, 34, 0.62);
        bottom: 30px;
        z-index: 100;
        text-shadow: 0 0 18px rgba(246, 221, 107, 0.28);
      }
      
      /* Splash Screen */
      .splash-screen {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 22%, rgba(255, 250, 217, 0.86) 0%, rgba(255, 250, 217, 0) 18%),
          radial-gradient(circle at 15% 20%, rgba(246, 221, 107, 0.2) 0%, rgba(246, 221, 107, 0) 32%),
          radial-gradient(circle at 85% 78%, rgba(255, 231, 138, 0.24) 0%, rgba(255, 231, 138, 0) 26%),
          linear-gradient(180deg, rgba(255, 254, 244, 0.99) 0%, rgba(255, 245, 200, 0.97) 55%, rgba(255, 232, 154, 0.96) 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Radial glow behind content */
      .splash-screen::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at center, rgba(255, 251, 226, 0.5) 0%, rgba(255, 251, 226, 0.14) 26%, transparent 58%),
          repeating-linear-gradient(135deg, rgba(234, 203, 72, 0.04) 0 2px, transparent 2px 14px);
        pointer-events: none;
      }

      .splash-screen::after {
        content: '';
        position: absolute;
        inset: 6%;
        border: 1px solid rgba(234, 203, 72, 0.14);
        border-radius: 32px;
        box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.14);
        pointer-events: none;
      }
      
      .splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Floating hearts background */
      .floating-hearts {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      
      .floating-heart {
        position: absolute;
        color: rgba(234, 203, 72, 0.34);
        filter: drop-shadow(0 0 8px rgba(246, 221, 107, 0.24));
        animation: floatUp linear infinite;
      }
      
      @keyframes floatUp {
        from {
          bottom: -10%;
          opacity: 0;
        }
        10% {
          opacity: 0.26;
        }
        90% {
          opacity: 0.26;
        }
        to {
          bottom: 110%;
          opacity: 0;
        }
      }
      
      .splash-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
        padding: 3.5rem 2rem;
      }
      
      /* Decorative heart icon */
      .decorative-heart {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .decorative-heart::before {
        content: '';
        position: absolute;
        inset: -1.5rem;
        background: radial-gradient(circle, rgba(255, 245, 200, 0.96) 0%, rgba(246, 221, 107, 0.34) 45%, transparent 72%);
        border-radius: 50%;
        filter: blur(18px);
      }
      
      .decorative-heart svg {
        position: relative;
        width: 3.35rem;
        height: 3.35rem;
        color: #eacb48;
        filter: drop-shadow(0 0 16px rgba(246, 221, 107, 0.48));
        animation: heartPulse 2.6s ease-in-out infinite;
      }
      
      @keyframes heartPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      
      .splash-title {
        font-size: clamp(2rem, 5vw, 3.75rem);
        font-weight: 400;
        letter-spacing: 0.08em;
        text-align: center;
        color: var(--cream);
        line-height: 1.4;
        text-shadow: 0 0 24px rgba(246, 221, 107, 0.18);
        animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      /* Decorative line */
      .decorative-line {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      
      .decorative-line .line {
        width: 3rem;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--line-soft) 30%, var(--line-soft) 70%, transparent 100%);
      }
      
      .decorative-line svg {
        width: 0.75rem;
        height: 0.75rem;
        color: rgba(217, 186, 77, 0.92);
        filter: drop-shadow(0 0 10px rgba(246, 221, 107, 0.28));
      }
      
      .start-button {
        position: relative;
        font-family: 'Fira Sans', sans-serif;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #7a6220;
        background: linear-gradient(135deg, rgba(255, 248, 197, 0.98) 0%, rgba(246, 221, 107, 0.94) 58%, rgba(234, 203, 72, 0.96) 100%);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(234, 203, 72, 0.28);
        padding: 0.9rem 3.25rem;
        border-radius: 9999px;
        cursor: pointer;
        box-shadow:
          0 14px 32px rgba(234, 203, 72, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.46);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      
      .start-button:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow:
          0 20px 36px rgba(234, 203, 72, 0.28),
          0 0 26px rgba(246, 221, 107, 0.24);
      }
      
      .start-button:active {
        transform: scale(0.97);
      }
      
      .start-button.clicked {
        background: linear-gradient(135deg, rgba(255, 242, 168, 1) 0%, rgba(234, 203, 72, 0.98) 100%);
        border-color: rgba(217, 186, 77, 0.42);
      }
      
      /* Pulse effect */
      .pulse-effect {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background: rgba(246, 221, 107, 0.32);
        animation: ping 1s cubic-bezier(0, 0, 0.2, 1);
      }
      
      @keyframes ping {
        75%, 100% {
          transform: scale(2);
          opacity: 0;
        }
      }
      
      /* Thank you message */
      .thank-you-message {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        letter-spacing: 0.04em;
        color: var(--text-soft);
        opacity: 0;
        transform: translateY(1rem);
        transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .thank-you-message.visible {
        opacity: 1;
        transform: translateY(0);
      }
      
      .thank-you-message svg {
        width: 0.875rem;
        height: 0.875rem;
        color: rgba(217, 186, 77, 0.94);
      }

      .heart-effects {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 200;
      }

      .click-count-toast {
        position: fixed;
        left: 0;
        top: 0;
        transform: translate(-50%, -50%);
        padding: 0;
        color: #fffef0;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        white-space: nowrap;
        text-shadow:
          0 0 8px rgba(255, 255, 240, 0.98),
          0 0 18px rgba(255, 244, 140, 0.92),
          0 0 30px rgba(246, 221, 107, 0.72);
        animation: clickToast 1.35s ease forwards;
      }

      .sunflower-pop {
        position: fixed;
        left: 0;
        top: 0;
        transform: translate(-50%, -50%);
        font-size: var(--size, 2rem);
        filter: drop-shadow(0 8px 12px rgba(234, 203, 72, 0.24));
        animation: sunflowerBurst 1.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      @keyframes clickToast {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.85);
        }
        15% {
          opacity: 1;
          transform: translate(-50%, calc(-50% - 8px)) scale(1);
        }
        70% {
          opacity: 1;
          transform: translate(-50%, calc(-50% - 14px)) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, calc(-50% - 26px)) scale(0.96);
        }
      }

      @keyframes sunflowerBurst {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) translate(0, 0) scale(0.4) rotate(-10deg);
        }
        20% {
          opacity: 1;
        }
        65% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform:
            translate(-50%, -50%)
            translate(var(--dx, 0px), var(--dy, 0px))
            scale(1.05)
            rotate(var(--rot, 0deg));
        }
      }

      .options-toggle {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 12020;
        border: 1px solid rgba(234, 203, 72, 0.28);
        background: rgba(255, 252, 234, 0.78);
        color: #7a6220;
        border-radius: 999px;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-size: 1rem;
        font-weight: 600;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 24px rgba(234, 203, 72, 0.16);
        cursor: pointer;
      }

      .options-panel {
        position: fixed;
        top: 58px;
        left: 18px;
        z-index: 12019;
        width: min(260px, calc(100vw - 36px));
        padding: 0.95rem;
        border-radius: 20px;
        border: 1px solid rgba(234, 203, 72, 0.24);
        background: rgba(255, 252, 234, 0.88);
        color: #7a6220;
        backdrop-filter: blur(16px);
        box-shadow: 0 16px 40px rgba(234, 203, 72, 0.18);
        opacity: 0;
        transform: translateY(-8px) scale(0.98);
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }

      .options-panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .options-title {
        margin-bottom: 0.7rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .options-grid {
        display: grid;
        gap: 0.55rem;
      }

      .options-field label {
        display: block;
        margin-bottom: 0.2rem;
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        opacity: 0.8;
      }

      .options-field input {
        width: 100%;
        border: 1px solid rgba(234, 203, 72, 0.28);
        background: rgba(255, 255, 255, 0.5);
        color: #7a6220;
        border-radius: 12px;
        padding: 0.5rem 0.65rem;
        font-size: 0.82rem;
        outline: none;
      }

      .options-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
      }

      .music-toggle {
        border: 1px solid rgba(234, 203, 72, 0.24);
        background: rgba(255, 247, 204, 0.8);
        color: #7a6220;
        border-radius: 999px;
        padding: 0.45rem 0.7rem;
        font-size: 0.76rem;
        font-weight: 600;
        cursor: pointer;
      }

      .preset-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45rem;
      }

      .preset-button,
      .apply-button {
        border: 1px solid rgba(234, 203, 72, 0.24);
        background: rgba(255, 247, 204, 0.85);
        color: #7a6220;
        border-radius: 14px;
        padding: 0.55rem 0.65rem;
        font-size: 0.76rem;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
      }

      .preset-button span {
        display: block;
        font-size: 0.68rem;
        opacity: 0.8;
        margin-top: 0.15rem;
      }

      .apply-button {
        width: 100%;
        text-align: center;
        margin-top: 0.15rem;
      }
      
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-2rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(2rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
      <!-- Floating hearts background -->
      <div class="floating-hearts" id="floatingHearts"></div>
      
      <div class="splash-content">
        <!-- Decorative heart icon -->
        <div class="decorative-heart">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </div>
        
        <!-- Main title -->
        <h1 class="splash-title">hello dmy</h1>
        
        <!-- Decorative line -->
        <div class="decorative-line">
          <div class="line"></div>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
          <div class="line"></div>
        </div>
        
        <!-- Button -->
        <div style="position: relative;">
          <button class="start-button" id="startButton">click to open</button>
        </div>
        
        <!-- Thank you message -->
        <div class="thank-you-message" id="thankYouMessage">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
          <span>my da noi vay thi ok thoi</span>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </div>
      </div>
    </div>
    
    <!-- Background Music -->
    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg">
      <source src="music.ogg" type="audio/ogg">
    </audio>

    <script type="module" src="./main.js"></script>

    <div class="heart-effects" id="heartEffects"></div>
    <button class="options-toggle" id="optionsToggle" type="button" aria-label="Options">⚙</button>
    <div class="options-panel" id="optionsPanel">
      <div class="options-title">Heart Options</div>
      <div class="options-grid">
        <div class="options-field">
          <label for="colorTop">Top Glow</label>
          <input id="colorTop" type="text" value="#FFF8C5" spellcheck="false">
        </div>
        <div class="options-field">
          <label for="colorMid">Main Gold</label>
          <input id="colorMid" type="text" value="#F6DD6B" spellcheck="false">
        </div>
        <div class="options-field">
          <label for="colorDeep">Deep Gold</label>
          <input id="colorDeep" type="text" value="#EACB48" spellcheck="false">
        </div>
        <button class="apply-button" id="applyColors" type="button">apply custom colors</button>
        <div class="options-row">
          <div class="options-title" style="margin: 0; font-size: 0.72rem;">Music</div>
          <button class="music-toggle" id="musicToggle" type="button">music: on</button>
        </div>
        <div class="options-title" style="margin: 0; font-size: 0.72rem;">Presets</div>
        <div class="preset-list">
          <button class="preset-button" type="button" data-preset="sunny" data-c1="#FFF8C5" data-c2="#F6DD6B" data-c3="#EACB48" data-icon="🌻">Sunny
            <span>🌻 butter gold</span>
          </button>
          <button class="preset-button" type="button" data-preset="peach" data-c1="#FFE7C8" data-c2="#FFC978" data-c3="#F0A54D" data-icon="🌼">Peach
            <span>🌼 warm honey</span>
          </button>
          <button class="preset-button" type="button" data-preset="pink" data-c1="#FFE1EF" data-c2="#FF9BC0" data-c3="#FF6CA0" data-icon="🌷">Pink
            <span>🌷 soft valentine</span>
          </button>
          <button class="preset-button" type="button" data-preset="mint" data-c1="#F4FFD8" data-c2="#D7F28A" data-c3="#B8D96A" data-icon="🍀">Mint
            <span>🍀 lime butter</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      // Generate floating hearts
      const floatingHeartsContainer = document.getElementById('floatingHearts');
      const heartCount = 18;
      
      for (let i = 0; i < heartCount; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.animationDelay = `${Math.random() * 8}s`;
        heart.style.animationDuration = `${6 + Math.random() * 8}s`;
        
        const size = 12 + Math.random() * 20;
        const opacity = 0.08 + Math.random() * 0.18;
        
        heart.innerHTML = `
          <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor" style="opacity: ${opacity}">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        `;
        
        floatingHeartsContainer.appendChild(heart);
      }
      
      // Handle splash screen and music
      const splashScreen = document.getElementById('splashScreen');
      const startButton = document.getElementById('startButton');
      const thankYouMessage = document.getElementById('thankYouMessage');
      const bgMusic = document.getElementById('bgMusic');
      
      let clicked = false;
      
      startButton.addEventListener('click', () => {
        if (!clicked) {
          clicked = true;
          
          // Add pulse effect
          const pulse = document.createElement('div');
          pulse.className = 'pulse-effect';
          startButton.parentElement.appendChild(pulse);
          setTimeout(() => pulse.remove(), 1000);
          
          // Add clicked state
          startButton.classList.add('clicked');
          
          // Show thank you message
          setTimeout(() => {
            thankYouMessage.classList.add('visible');
          }, 300);
          
          // Fade out splash screen after a delay
          setTimeout(() => {
            splashScreen.classList.add('hidden');
          }, 2000);
          
          // Play music with fade in
          bgMusic.volume = 0;
          bgMusic.play().then(() => {
            let volume = 0;
            const fadeIn = setInterval(() => {
              if (volume < 0.5) {
                volume += 0.05;
                bgMusic.volume = Math.min(volume, 0.5);
              } else {
                clearInterval(fadeIn);
              }
            }, 100);
          }).catch(err => {
            console.warn('Audio playback failed:', err);
          });
        }
      });

      const optionsToggle = document.getElementById('optionsToggle');
      const optionsPanel = document.getElementById('optionsPanel');
      const applyColorsButton = document.getElementById('applyColors');
      const musicToggle = document.getElementById('musicToggle');
      const colorTop = document.getElementById('colorTop');
      const colorMid = document.getElementById('colorMid');
      const colorDeep = document.getElementById('colorDeep');
      const presetButtons = Array.from(document.querySelectorAll('.preset-button'));

      const normalizeHex = (value) => {
        const trimmed = value.trim();
        if (!trimmed) return null;
        const normalized = trimmed.startsWith('#') ? trimmed : `#${trimmed}`;
        return /^#[0-9a-fA-F]{6}$/.test(normalized) ? normalized.toUpperCase() : null;
      };

      const setMusicButtonState = () => {
        musicToggle.textContent = bgMusic.paused ? 'music: off' : 'music: on';
      };

      const applyPalette = ({ color1, color2, color3, icon }) => {
        if (!window.heartCustomizer) return;
        window.heartCustomizer.setHeartPalette({ color1, color2, color3 });
        if (icon) {
          window.heartCustomizer.setBurstEmoji(icon);
        }
        colorTop.value = color1;
        colorMid.value = color2;
        colorDeep.value = color3;
      };

      const syncCustomizerState = () => {
        if (!window.heartCustomizer) {
          requestAnimationFrame(syncCustomizerState);
          return;
        }

        const state = window.heartCustomizer.getState();
        colorTop.value = state.color1;
        colorMid.value = state.color2;
        colorDeep.value = state.color3;
      };

      syncCustomizerState();
      setMusicButtonState();

      optionsToggle.addEventListener('click', () => {
        optionsPanel.classList.toggle('open');
      });

      applyColorsButton.addEventListener('click', () => {
        const color1 = normalizeHex(colorTop.value);
        const color2 = normalizeHex(colorMid.value);
        const color3 = normalizeHex(colorDeep.value);

        if (!color1 || !color2 || !color3) {
          return;
        }

        applyPalette({ color1, color2, color3 });
      });

      presetButtons.forEach((button) => {
        button.addEventListener('click', () => {
          applyPalette({
            color1: button.dataset.c1,
            color2: button.dataset.c2,
            color3: button.dataset.c3,
            icon: button.dataset.icon,
          });
        });
      });

      musicToggle.addEventListener('click', async () => {
        if (bgMusic.paused) {
          try {
            await bgMusic.play();
            if (bgMusic.volume < 0.45) {
              bgMusic.volume = 0.45;
            }
          } catch (err) {
            console.warn('Audio playback failed:', err);
          }
        } else {
          bgMusic.pause();
        }
        setMusicButtonState();
      });

      bgMusic.addEventListener('play', setMusicButtonState);
      bgMusic.addEventListener('pause', setMusicButtonState);
    </script>

    <div class="footer">ok mau tim</div>
  </body>
</html>
